name: 오즈백 릴스 자동 제작

# 매일 8회(07/09/12/14/17/19/21/23시 KST) 각 1개씩 = 하루 8개. 수동 실행도 가능.
#
# 유튜브는 무료 한도(10,000 units/일)상 하루 5개가 상한이다(1개당 약 1,701 units).
# 앞선 5개는 유튜브+인스타+페북, 나머지 3개는 인스타 릴스+페북에만 올라간다.
# (make-reels.mjs 가 하루 업로드 수를 세어 자동으로 판단한다)
on:
  schedule:
    - cron: "0 22,0,3,5,8,10,12,14 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "한 번에 만들 릴스 수"
        default: "1"

concurrency:
  group: oddsbag-reels
  cancel-in-progress: false

jobs:
  reels:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ffmpeg 설치
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 렌더링 라이브러리 설치
        working-directory: factory
        run: npm ci

      - name: 릴스 제작 (+ 게시)
        working-directory: factory
        env:
          # DB 직접 읽기 (Vercel 불필요)
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          ODDS_VOICE: ${{ secrets.ODDS_VOICE }}
          # 배경영상(B-roll) 켜기 — Pexels 무료·상업안전. 못 찾으면 자동 타이포 폴백
          USE_BROLL: "1"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          # --- 게시용 (없으면 영상만 만들고 게시는 건너뜀) ---
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          MEDIA_PUBLIC_BASE: ${{ secrets.MEDIA_PUBLIC_BASE }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FB_PUBLISHED: ${{ secrets.FB_PUBLISHED }}
          YT_DAILY_CAP: "5" # 유튜브 무료 한도상 하루 5개까지만
          REEL_LIMIT: ${{ github.event.inputs.limit || '1' }}
        run: node make-reels.mjs

      - name: 완성 영상 보관 (다운로드용)
        uses: actions/upload-artifact@v4
        with:
          name: reels
          path: factory/out/*.mp4
          if-no-files-found: ignore
          retention-days: 7
