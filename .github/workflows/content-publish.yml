name: 오즈백 예약 발행

# 15분마다 대기열을 확인해 시간이 된 글을 올린다. 실제 발행은 하루 3편까지. (Vercel 크론 대체 — 무료)
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: oddsbag-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 발행 실행
        working-directory: content-factory
        env:
          TIPS_PER_DAY: "1" # 꿀팁 하루 생산 상한 (피드 도배 방지)
          PUBLISH_DAILY_CAP: "3" # 홈페이지 하루 발행 상한
          PUBLISH_MAX_PER_RUN: "1" # 한 회차에 1편씩만
          SOCIAL_DAILY_CAP: "2" # 인스타 카드뉴스 2개 (+릴스 1개 = 하루 3개)
          SOCIAL_GAP_MIN: "360" # SNS 게시 최소 간격 6시간
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node run-publish.mjs
