name: 오즈백 수집·작성·발행

# 2시간마다 깨어나되, 실제로 쓰는 건 하루 3편이다(아침 7시·낮 1시·저녁 7시 슬롯).
# 편수를 줄인 만큼 글 한 편에 AI 예산을 더 쓴다.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: oddsbag-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 수집 실행
        working-directory: content-factory
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AI_PHOTO_PICK: "on" # AI가 기사에 맞는 사진을 직접 골라준다 (하루 3편이라 비용 여유 있음)
          COLLECT_LIMIT: "1" # 한 회차에 쓸 글 수 (슬롯당 1편)
          WRITE_DAILY_CAP: "3" # 하루 작성 편수 (핵심 정책)
          WRITE_SLOTS_KST: "7,13,19" # 아침·낮·저녁에 한 편씩
          QUEUE_MAX: "4" # 발행 대기열 상한 (묵은 뉴스 방지)
          PUBLISH_GAP_MIN: "300" # 발행 간격 5시간 → 하루 3편이 고르게 퍼진다
          PUBLISH_DAILY_CAP: "3" # 홈페이지 하루 발행 상한
          TIPS_PER_DAY: "1" # 꿀팁 하루 생산 상한 (피드 도배 방지)
          SOCIAL_DAILY_CAP: "2" # 인스타 카드뉴스 2개 (+릴스 1개 = 인스타 하루 3개)
          SOCIAL_GAP_MIN: "360" # SNS 게시 최소 간격 6시간
        run: node run-collect.mjs
